; PlatformIO configuration for Daydream Controller Air Mouse
; Target: Seeed XIAO ESP32-S3 Sense

[env:seeed_xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino

; Enable native USB HID + CDC serial for debugging
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; NimBLE for lighter BLE stack (vs. default Bluedroid)
lib_deps =
    h2zero/NimBLE-Arduino@^1.4.0

monitor_speed = 115200
