; PlatformIO configuration for Daydream Air Mouse
; Each board gets its own [env:xxx] section.
; To add a new board, see CONTRIBUTING.md.

; ─── Shared settings ─────────────────────────────────────────────────────────

[common]
framework = arduino
lib_deps = h2zero/NimBLE-Arduino@^1.4.0
monitor_speed = 115200
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; ─── Official Boards ─────────────────────────────────────────────────────────

[env:xiao_esp32s3]
extends = common
platform = espressif32
board = seeed_xiao_esp32s3
build_flags =
    ${common.build_flags}
    -DBOARD_XIAO_ESP32S3

; ─── Community Boards ────────────────────────────────────────────────────────
; Add your board environment below! Example:
;
; [env:esp32s3_devkit]
; extends = common
; platform = espressif32
; board = esp32-s3-devkitc-1
; build_flags =
;     ${common.build_flags}
;     -DBOARD_ESP32S3_DEVKIT
