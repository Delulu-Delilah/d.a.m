; PlatformIO configuration for Daydream Air Mouse
; Each board gets its own [env:xxx] section.
; To add a new board, see CONTRIBUTING.md.

; ─── Shared settings ─────────────────────────────────────────────────────────

[common]
framework = arduino
lib_deps = h2zero/NimBLE-Arduino@^1.4.0
monitor_speed = 115200
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; ─── Official Boards ─────────────────────────────────────────────────────────

[env:xiao_esp32s3]
extends = common
platform = espressif32
board = seeed_xiao_esp32s3
build_flags =
    ${common.build_flags}
    -DBOARD_XIAO_ESP32S3

; ─── Community Boards (⚠️ UNTESTED) ──────────────────────────────────────────
; These boards should work but have not been verified by the maintainers.
; If you test one successfully, please open an issue or PR!

[env:esp32s3_devkitc]
extends = common
platform = espressif32
board = esp32-s3-devkitc-1
build_flags =
    ${common.build_flags}
    -DBOARD_ESP32S3_DEVKITC

[env:adafruit_qtpy_esp32s3]
extends = common
platform = espressif32
board = adafruit_qtpy_esp32s3_n4r2
build_flags =
    ${common.build_flags}
    -DBOARD_ADAFRUIT_QTPY_ESP32S3

[env:lolin_s3_mini]
extends = common
platform = espressif32
board = lolin_s3_mini
build_flags =
    ${common.build_flags}
    -DBOARD_LOLIN_S3_MINI

[env:um_tinys3]
extends = common
platform = espressif32
board = um_tinys3
build_flags =
    ${common.build_flags}
    -DBOARD_UM_TINYS3

[env:waveshare_esp32s3_zero]
extends = common
platform = espressif32
board = esp32-s3-devkitc-1
board_upload.flash_size = 4MB
build_flags =
    ${common.build_flags}
    -DBOARD_WAVESHARE_ESP32S3_ZERO
