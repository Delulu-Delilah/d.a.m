<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <!-- Modern Tech Gradient Background -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="50%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>

    <!-- Center/Right Glow for Text -->
    <radialGradient id="text-glow" cx="75%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.20" />
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0" />
    </radialGradient>

    <!-- Left Glow for Controller -->
    <radialGradient id="ctrl-glow" cx="25%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#818CF8" stop-opacity="0" />
    </radialGradient>

    <!-- Daydream logo subtle backdrop -->
    <radialGradient id="daydream-grad" cx="0" cy="0" r="1" gradientTransform="matrix(79.4171 105.738 -97.2246 86.3713 23.3114 19.744)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1DDDBD" stop-opacity="0.3"/>
      <stop offset="0.41" stop-color="#1ED9C0" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#0EA5E9" stop-opacity="0.1"/>
    </radialGradient>

    <!-- Controller Gradients -->
    <linearGradient gradientUnits="userSpaceOnUse" id="ctrl-1" x1="108.5" x2="399.8" y1="110.2" y2="401.5">
      <stop offset="0" stop-color="#0EA5E9"/><stop offset="0.5" stop-color="#38BDF8"/><stop offset="1" stop-color="#0284C7"/>
    </linearGradient>
    <linearGradient gradientUnits="userSpaceOnUse" id="ctrl-2" x1="197.5" x2="310.4" y1="27.8" y2="140.7">
      <stop offset="0" stop-color="#0EA5E9"/><stop offset="0.5" stop-color="#38BDF8"/><stop offset="1" stop-color="#0284C7"/>
    </linearGradient>
    
    <!-- Text gradient -->
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#BAE6FD" />
    </linearGradient>

    <filter id="drop-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="24" stdDeviation="32" flood-color="#000000" flood-opacity="0.8"/>
    </filter>
    
    <filter id="cursor-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="8" dy="16" stdDeviation="16" flood-color="#000000" flood-opacity="0.5"/>
    </filter>

    <filter id="text-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg-grad)" />
  <rect width="1920" height="1080" fill="url(#text-glow)" />
  <rect width="1920" height="1080" fill="url(#ctrl-glow)" />

  <!-- Background Pattern - Daydream Logo huge and rotated - moved behind controller so it doesn't overlap text -->
  <g transform="translate(400, 500) scale(8) rotate(-15)" opacity="0.1">
    <path d="M74.6112 53.6909L74.6139 53.6961L89.4737 42.73L74.6112 53.6909ZM99.1182 35.6172L99.2752 35.5015C95.9716 14.9442 75.4086 7.38502 62.4591 12.01C55.2393 14.5886 49.2795 21.4041 50.2102 31.3204C52.3769 32.1474 54.8059 33.3552 57.3105 34.9365C55.4692 33.7927 53.5303 32.7622 51.4987 31.8571C51.1299 31.6903 50.597 31.4757 50.2253 31.3264L53.375 61.5729L53.3692 61.5726L50.2124 31.339C30.7576 23.9214 13.4853 37.6013 11.0159 51.1284C9.63915 58.6703 12.761 67.3537 21.8142 71.5059C22.056 71.3118 22.3063 71.117 22.5646 70.9219C22.3067 71.1186 22.0308 71.3369 21.8155 71.5079L49.5668 83.8977C49.5667 83.898 49.5665 83.8983 49.5663 83.8985L21.8175 71.5172C5.66624 84.6568 8.95152 106.561 19.4316 115.463C25.2699 120.423 34.2522 121.775 42.3694 116.028C42.3703 116.034 42.3712 116.04 42.3721 116.046L42.3731 116.045C45.6839 136.592 66.1449 144.887 79.0914 140.263C86.3113 137.684 92.1813 130.582 91.2506 120.666L91.2449 120.663L88.2482 90.4895C90.2252 90.5831 92.2086 90.5561 94.1867 90.4068C92.2617 90.5567 90.2847 90.592 88.2681 90.4915L91.2528 120.654C110.708 128.072 128.03 114.379 130.5 100.852C131.875 93.3166 128.702 84.8324 119.667 80.6764L119.683 80.6637L119.706 80.6742C135.858 67.5346 132.62 45.6299 122.14 36.7278C116.299 31.7659 107.392 29.7569 99.2715 35.5155L99.2709 35.5111L99.1182 35.6172ZM42.1325 113.965C42.0017 112.451 41.9431 110.945 41.9543 109.451C41.9335 111.043 41.9973 112.556 42.1325 113.965ZM46.8238 88.7919C47.5222 87.3598 48.2906 85.9621 49.1253 84.6032C48.272 85.9796 47.5068 87.3798 46.8238 88.7919ZM71.8307 105.881C70.0123 103.587 68.3689 101.075 67.0091 98.3627L67.0122 98.3604C68.388 101.009 69.9987 103.527 71.8307 105.881ZM90.295 120.28C88.9756 119.722 87.5782 119.028 86.1408 118.205C87.4273 118.927 88.7577 119.596 90.1303 120.208C90.1852 120.232 90.2401 120.256 90.295 120.28ZM118.578 81.5025C115.644 83.6155 112.547 85.3502 109.348 86.7149C112.987 85.1865 116.12 83.3521 118.578 81.5025ZM99.1771 49.1731C99.1621 49.2703 99.1468 49.3675 99.1312 49.4649C99.3757 47.8669 99.54 46.2479 99.6208 44.6122C99.5552 46.0967 99.4163 47.6231 99.1771 49.1731ZM99.3435 36.2927C99.3985 36.8576 99.4495 37.4389 99.494 38.0349C99.4701 37.7614 99.4437 37.4877 99.4151 37.2137C99.3967 37.0465 99.3788 36.7919 99.3599 36.5231L99.3599 36.5229L99.3599 36.5226L99.3598 36.5219L99.3598 36.5217L99.3435 36.2927ZM74.0934 52.7216C72.6557 50.1006 70.9842 47.6145 69.0923 45.2976C70.9392 47.5345 72.6397 50.0105 74.0934 52.7216ZM52.1647 61.5309C49.1107 61.4633 46.0451 61.6842 43.0116 62.1998C45.9835 61.6632 49.0635 61.4054 52.1647 61.5309ZM24.5661 69.5145C24.0078 69.8852 23.4549 70.2691 22.9077 70.6663C23.4302 70.2819 23.9838 69.897 24.5661 69.5145Z" fill="url(#daydream-grad)"/>
  </g>

  <!-- Graphic Composition (Left/Center) -->
  <g transform="translate(300, 650) rotate(45)">
    <!-- Controller centered at local (0,0) -->
    <g transform="scale(1.6) translate(-254, -220)" filter="url(#drop-shadow)">
      <!-- Base -->
      <path d="M337.694,81.3 c0-43.9-37.389-79.488-83.507-79.488c-46.121,0-83.507,35.587-83.507,79.488v349.192 c0,43.897,37.386,79.486,83.507,79.486c46.118,0,83.507-35.589,83.507-79.486V81.3z" fill="#18181B" stroke="url(#ctrl-1)" stroke-width="4"/>
      <!-- Trackpad -->
      <circle cx="254.038" cy="84.279" fill="#27272A" r="78.841" stroke="url(#ctrl-2)" stroke-width="3"/>
      <!-- Volume minus -->
      <path d="M254.188,179.649 c-17.028,0-30.881,13.854-30.881,30.882c0,17.027,13.853,30.881,30.881,30.881c17.027,0,30.88-13.854,30.88-30.881 C285.067,193.503,271.215,179.649,254.188,179.649z" fill="#27272A" stroke="#52525B" stroke-width="2"/>
      <rect x="242" y="208" width="24" height="3" rx="1.5" fill="#A1A1AA" />
      <!-- App button -->
      <path d="M254.188,259.819 c-17.028,0-30.881,13.854-30.881,30.882c0,17.026,13.853,30.88,30.881,30.88c17.027,0,30.88-13.854,30.88-30.88 C285.067,273.673,271.215,259.819,254.188,259.819z" fill="#27272A" stroke="#52525B" stroke-width="2"/>
      <!-- Home button dimple -->
      <circle cx="254" cy="290" r="8" fill="#52525B" />
    </g>

    <!-- Emitting connection Wi-Fi lines -->
    <!-- Pointing perfectly up towards the new cursor position. -->
    <g transform="translate(0, -350)" stroke="#38BDF8" stroke-width="12" stroke-linecap="round" fill="none">
      <path d="M -60,0 Q 0,-80 60,0" opacity="0.9" filter="url(#text-shadow)"/>
      <path d="M -100,-40 Q 0,-140 100,-40" opacity="0.6" filter="url(#text-shadow)"/>
      <path d="M -140,-80 Q 0,-200 140,-80" opacity="0.3" filter="url(#text-shadow)"/>
    </g>

    <!-- macOS Cursor Pointing -->
    <!-- Positioned precisely along the controller's axis -->
    <g transform="translate(0, -650) rotate(-45)">
      <!-- Filter wrapper to prevent drop-shadow from flipping directions -->
      <g filter="url(#cursor-shadow)">
        <g transform="scale(-11, 11)">
          <path d="m6.148 18.473 1.863-1.003 1.615-.839-2.568-4.816h4.332l-11.379-11.408v16.015l3.316-3.221z" fill="#FFFFFF" stroke="#000000" stroke-width="0.75" stroke-linejoin="round"/>
        </g>
      </g>
    </g>
  </g>

  <!-- Typography (Right Side) -->
  <g transform="translate(950, 400)" filter="url(#text-shadow)">
    <!-- Small tech text above -->
    <text x="0" y="0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="600" font-size="32" fill="#38BDF8" letter-spacing="6">OPEN SOURCE FIRMWARE</text>
    
    <!-- Super Bold Project Title -->
    <text x="-8" y="140" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="900" font-size="160" fill="url(#text-grad)" letter-spacing="-5">Daydream</text>
    <text x="-8" y="290" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="900" font-size="160" fill="url(#text-grad)" letter-spacing="-5">Air Mouse</text>
    
    <!-- Subtitle description -->
    <text x="10" y="420" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="500" font-size="44" fill="#94A3B8" letter-spacing="0">Turn your VR controller into a</text>
    <text x="10" y="480" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="500" font-size="44" fill="#94A3B8" letter-spacing="0">wireless USB presentation mouse.</text>
    
    <!-- Microcontroller Tag -->
    <g transform="translate(10, 560)">
      <rect width="360" height="72" rx="36" fill="#334155" opacity="0.6"/>
      <text x="180" y="46" font-family="monospace" font-weight="600" font-size="28" fill="#CBD5E1" text-anchor="middle">⚡ Powered by ESP32-S3</text>
    </g>
  </g>
</svg>
