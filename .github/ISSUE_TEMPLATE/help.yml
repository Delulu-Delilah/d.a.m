name: ❓ Help / Question
description: Need help getting things working
labels: ["question"]
body:
  - type: textarea
    id: question
    attributes:
      label: What do you need help with?
      placeholder: Describe your question or issue
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Flashing firmware
        - Controller pairing
        - Controls / button mapping
        - Adding a new board
        - Other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      placeholder: Board model, OS, browser (for web flasher), etc.
